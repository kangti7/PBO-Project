<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - FinanceBuddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="logo">FinanceBuddy</div>
        <ul>
            <li><a class="active" href="admin.html">Dashboard</a></li>
            <li><a href="profil.html">Profil Saya</a></li>
            <li><a href="#">User</a></li>
            <li><a href="#">Laporan</a></li>
            <li><a href="index.html" style="color: #dc3545;">Logout</a></li>
        </ul>
    </div>

    <div class="content">

        <div class="topbar">
            <h1 class="page-title">Admin Dashboard</h1>
            <div class="profile-mini">AD</div>
        </div>

        <div class="grid grid-3">
            <div class="card">
                <div class="card-title">Total User</div>
                <div class="card-value">0</div>
            </div>

            <div class="card">
                <div class="card-title">Total Transaksi</div>
                <div class="card-value">0</div>
            </div>

            <div class="card">
                <div class="card-title">Total Pendapatan</div>
                <div class="card-value">Rp 0</div>
            </div>
        </div>

        <br>

        <div class="card">
            <h3>Daftar User</h3>
            <br>
            <table>
                <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td colspan="3" style="text-align: center; color: #999; padding: 30px;">
                        Belum ada data user terdaftar.
                    </td>
                </tr>
            </table>
        </div>

    </div>

</div>

</body>
</html>
